<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-генератор принтеров</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #F8FAFC;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 32px 18px;
            color: #1E293B;
        }

        .card {
            background: #FFFFFF;
            padding: 38px 28px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.75);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #1E3A8A;
            letter-spacing: 0;
        }

        p {
            font-size: 14px;
            color: #64748B;
            margin: 0 0 24px 0;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            background-color: #F8FAFC;
            color: #1E293B;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563EB;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
        }

        button {
            width: 100%;
            background-color: #2563EB;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.18);
        }

        button:hover {
            background-color: #1D4ED8;
            box-shadow: 0 14px 32px rgba(37, 99, 235, 0.22);
        }

        button:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        #qrResult {
            margin-top: 32px;
            padding-top: 28px;
            border-top: 1px solid rgba(30, 41, 59, 0.1);
        }

        #qrResult h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1E3A8A;
            margin: 0 0 8px 0;
        }

        #qrResult .printer-id {
            font-size: 13px;
            color: #64748B;
            margin-bottom: 20px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        #qrcode img,
        #qrcode canvas {
            border-radius: 12px;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.1);
        }

        .qr-link {
            font-size: 13px;
            color: #2563EB;
            word-break: break-all;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .qr-link a {
            color: #2563EB;
            text-decoration: none;
        }

        .qr-link a:hover {
            text-decoration: underline;
        }

        .print-btn {
            background-color: #1E293B;
            box-shadow: 0 10px 28px rgba(30, 41, 59, 0.18);
        }

        .print-btn:hover {
            background-color: #0F172A;
        }

        #stickerToPrint {
            display: none;
            position: relative;
            width: 500px;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            container-type: inline-size;
        }

        .sticker-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        #stickerQr {
            position: absolute;
            left: 50%;
            top: 40%;
            width: 32%;
            aspect-ratio: 1 / 1;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        #stickerQr img,
        #stickerQr canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        #stickerInventory {
            position: absolute;
            left: 26%;
            top: 82%;
            transform: translateX(-50%);
            width: 45%;
            color: #111827;
            font-family: Arial, sans-serif;
            font-size: 5.6cqw;
            font-weight: 800;
            line-height: 1;
            text-align: center;
            letter-spacing: 0.04em;
            z-index: 10;
        }

        .service-update {
            margin-top: 28px;
            padding-top: 28px;
            border-top: 1px solid rgba(30, 41, 59, 0.1);
            text-align: left;
        }

        .service-update h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1E3A8A;
            margin: 0 0 8px 0;
            text-align: center;
        }

        .service-update p {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Dashboard Layout and Right Column Styles */
        .dashboard-container {
            display: flex;
            gap: 24px;
            width: 100%;
            max-width: 1050px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .dashboard-left {
            width: 100%;
            max-width: 440px;
            flex-shrink: 0;
        }

        .dashboard-right {
            flex-grow: 1;
            max-width: 580px;
            text-align: left !important;
            padding: 34px 28px !important;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .db-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1E3A8A;
            margin: 0 0 16px 0;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .search-wrapper input {
            padding-left: 40px !important;
            box-sizing: border-box;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 16px;
            pointer-events: none;
        }

        .db-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            color: #64748B;
            font-size: 14px;
            gap: 12px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #E2E8F0;
            border-top-color: #2563EB;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .db-error {
            color: #EF4444;
            background: #FEF2F2;
            border: 1px solid #FEE2E2;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }

        .printer-list-wrapper {
            max-height: 520px;
            overflow-y: auto;
            padding-right: 6px;
        }

        /* Стильный скроллбар */
        .printer-list-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        .printer-list-wrapper::-webkit-scrollbar-track {
            background: #F1F5F9;
            border-radius: 8px;
        }
        .printer-list-wrapper::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 8px;
        }
        .printer-list-wrapper::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        .db-printer-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .db-card {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .db-card:hover {
            border-color: #2563EB;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.06);
            background-color: #F8FAFC;
        }

        .db-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .badge {
            background-color: #EFF6FF;
            color: #2563EB;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #DBEAFE;
        }

        .db-card-model {
            font-weight: 700;
            font-size: 14px;
            color: #1E293B;
        }

        .db-meta-row {
            display: flex;
            font-size: 13px;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .meta-label {
            color: #64748B;
            width: 95px;
            flex-shrink: 0;
        }

        .meta-value {
            color: #334155;
        }

        .meta-value.text-bold {
            font-weight: 600;
        }

        .history-box {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #E2E8F0;
        }
        
        .history-box h4 {
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            margin: 0 0 8px 0;
        }
        
        .history-list {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        
        /* Скроллбар для истории */
        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #F1F5F9;
            border-radius: 4px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }
        
        .history-item {
            background: #F8FAFC;
            border: 1px solid #EFF2F6;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
        }
        
        .history-item-header {
            display: flex;
            justify-content: space-between;
            color: #64748B;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .history-item-desc {
            color: #334155;
            line-height: 1.4;
        }

        .selected-printer-history {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px dashed rgba(30, 41, 59, 0.1);
            text-align: left;
        }

        .selected-history-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        /* Тонкий скроллбар для левой истории */
        .selected-history-list::-webkit-scrollbar {
            width: 4px;
        }
        .selected-history-list::-webkit-scrollbar-track {
            background: #F1F5F9;
            border-radius: 4px;
        }
        .selected-history-list::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }

        @media (max-width: 900px) {
            .dashboard-container {
                flex-direction: column;
                align-items: center;
            }
            .dashboard-left,
            .dashboard-right {
                width: 100%;
                max-width: 480px;
            }
        }

        @media print {
            body {
                background: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .dashboard-container {
                display: none !important;
            }

            .card {
                display: none !important;
            }

            #stickerToPrint {
                display: block !important;
                position: relative !important;
                width: 100% !important;
                max-width: 500px !important;
                aspect-ratio: 1 / 1 !important;
                margin: 0 auto !important;
                box-shadow: none !important;
                border: none !important;
            }

            .sticker-bg {
                display: block !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: 100% !important;
                object-fit: contain !important;
                z-index: 1 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                image-rendering: -webkit-optimize-contrast !important;
                image-rendering: crisp-edges !important;
            }

            @page {
                margin: 0;
                size: auto;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <!-- Левая колонка (Формы и результат) -->
        <div class="card dashboard-left">
            <h1>QR-генератор</h1>
            <p>Создайте наклейку для принтера</p>

            <form id="orderForm">
                <div class="form-group">
                    <label for="nameInput">Ответственное лицо</label>
                    <input type="text" id="nameInput" placeholder="Например, Иван Петров" required>
                </div>

                <div class="form-group">
                    <label for="phoneInput">Телефон клиента</label>
                    <input type="tel" id="phoneInput" placeholder="Например: +77071234567" required>
                </div>

                <div class="form-group">
                    <label for="modelInput">Модель принтера</label>
                    <input type="text" id="modelInput" placeholder="Например, Canon LBP6030" required>
                </div>
                <div class="form-group">
                    <label for="cartridgeNumber">Номер картриджа</label>
                    <input type="text" id="cartridgeNumber" placeholder="Например: CF259A или TK-1150">
                </div>

                <div class="form-group">
                    <label for="addressInput">Адрес установки</label>
                    <input type="text" id="addressInput" placeholder="Например, каб. 104, этаж 1" required>
                </div>

                <button type="submit">Сгенерировать и отправить в базу</button>
            </form>

            <div class="service-update">
                <h2>🛠 Отметить обслуживание принтера</h2>
                <p>Обновите последнюю запись после выполненных работ</p>

                <div class="form-group">
                    <label for="updatePrinterId">ID принтера</label>
                    <input type="text" id="updatePrinterId" placeholder="Например: PR-588">
                </div>

                <div class="form-group">
                    <label for="updateServiceText">Проведенные работы</label>
                    <input type="text" id="updateServiceText"
                        placeholder="Например: 12 июля — Заправка картриджа (Мастер: Валерий)">
                </div>

                <button type="button" id="saveServiceBtn">Сохранить обслуживание</button>

                <!-- Блок истории работ для выбранного принтера -->
                <div id="selectedPrinterHistory" class="selected-printer-history hidden">
                    <h3 style="font-size: 14px; font-weight: 700; color: #1E3A8A; margin: 20px 0 10px 0; text-align: left;">История работ для выбранного принтера:</h3>
                    <div id="selectedPrinterHistoryList" class="selected-history-list">
                        <!-- Записи обслуживания будут загружаться сюда -->
                    </div>
                </div>
            </div>

            <div id="qrResult" class="hidden">
                <h2>QR-код готов</h2>
                <p class="printer-id" id="qrPrinterId"></p>
                <div id="qrcode"></div>
                <p class="qr-link" id="qrUrl"></p>
                <button type="button" id="printStickerBtn" class="print-btn">Распечатать наклейку</button>
            </div>
        </div>

        <!-- Правая колонка (База данных) -->
        <div class="card dashboard-right" id="printerDashboard">
            <div class="db-header">
                <h2>База принтеров и клиентов</h2>
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="dbSearchInput" placeholder="Поиск по имени, телефону, модели или ID...">
                </div>
            </div>

            <div id="dbLoading" class="db-loading">
                <div class="spinner"></div>
                <span>Загрузка данных...</span>
            </div>

            <div id="dbError" class="db-error hidden">
                Не удалось загрузить данные из Supabase.
            </div>

            <div id="printerListWrapper" class="printer-list-wrapper hidden">
                <div id="dbPrinterList" class="db-printer-list">
                    <!-- Карточки будут добавлены динамически -->
                </div>
            </div>
        </div>
    </div>

    <div id="stickerToPrint" aria-hidden="true">
        <img class="sticker-bg" src="sticker-template.png" alt="">
        <div id="stickerQr"></div>
        <div id="stickerInventory"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
