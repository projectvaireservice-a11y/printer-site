<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Завершение заявки</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #F8FAFC; margin: 0; }
    .card { background: white; padding: 35px; border-radius: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); max-width: 360px; width: 90%; }
    h2 { color: #16A34A; margin-bottom: 8px; font-size: 20px; }
    p { color: #64748B; font-size: 14px; margin: 0; }
    .icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div class="card">
    <div id="icon" class="icon">⏳</div>
    <h2 id="title">Выполняем...</h2>
    <p id="desc">Обновляем статус заявки</p>
  </div>

  <script>
    const SUPABASE_URL = "https://wxkqfkjaretsqzdfnzhw.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4a3Fma2phcmV0c3F6ZGZuemh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDM1NTMsImV4cCI6MjA5OTI3OTU1M30.7ztRTIZM9ytG9LLCFE5pvVTEpV9re5IrxIomMrJxVKw";

    const urlParams = new URLSearchParams(window.location.search);
    const printerId = urlParams.get('id');

    async function completeOrder() {
      if (!printerId) return;

      // 1. Обновляем статус принтера в Supabase на "Выполнено"
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/printers?id=eq.${encodeURIComponent(printerId)}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ status: 'Выполнено' })
        });
      } catch (e) {
        console.error("Supabase update error:", e);
      }

      // 2. Отображаем успех на экране
      document.getElementById('icon').innerText = "✅";
      document.getElementById('title').innerText = "Заявка выполнена!";
      document.getElementById('desc').innerText = "Возвращаемся в Telegram...";

      // 3. Возвращаем мастера обратно в Telegram
      setTimeout(() => {
        window.close();
        if (!window.closed) {
          history.back();
        }
      }, 500);
    }

    completeOrder();
  </script>
</body>
</html>
